<script src="public/js/config.js"></script>
<script src="public/js/app.js"></script>
<script>
  function updateThemeStatus() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const statusEl = document.getElementById('currentTheme');
    const diagnosticsEl = document.getElementById('diagnostics');
    
    statusEl.textContent = currentTheme === 'dark' ? '🌙 Тёмная тема активна' : '☀️ Светлая тема активна';
    statusEl.className = 'status ' + (currentTheme === 'dark' ? 'success' : '');
    
    // Диагностика
    const styles = getComputedStyle(document.documentElement);
    diagnosticsEl.innerHTML = `
      <div>data-theme: ${currentTheme}</div>
      <div>--bg-gray: ${styles.getPropertyValue('--bg-gray').trim()}</div>
      <div>--bg-light: ${styles.getPropertyValue('--bg-light').trim()}</div>
      <div>--white: ${styles.getPropertyValue('--white').trim()}</div>
      <div>--text-dark: ${styles.getPropertyValue('--text-dark').trim()}</div>
      <div>--text-gray: ${styles.getPropertyValue('--text-gray').trim()}</div>
      <div>--border-light: ${styles.getPropertyValue('--border-light').trim()}</div>
      <div>localStorage.theme: ${localStorage.getItem('theme')}</div>
    `;
  }
  
  // Обновляем при загрузке и при переключении
  updateThemeStatus();
  document.addEventListener('click', (e) => {
    if (e.target.hasAttribute('data-theme-toggle')) {
      setTimeout(updateThemeStatus, 100);
    }
  });
  
  // Наблюдаем за изменениями атрибутов
  const observer = new MutationObserver(updateThemeStatus);
  observer.observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['data-theme']
  });
</script>

</body>
</html>
